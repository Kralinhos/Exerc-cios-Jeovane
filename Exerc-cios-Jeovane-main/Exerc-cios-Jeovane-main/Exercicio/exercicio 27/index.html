<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 27 - Sistema de Produtos</title>
</head>
<link rel="stylesheet" href="../../style.css">
</head>
<body>
    <h1>Sistema de Cadastro de Produtos</h1>
    
    <div>
        <label for="nomeProduto">Nome do Produto:</label>
        <input type="text" id="nomeProduto" placeholder="Digite o nome">
    </div>

    <div>
        <label for="precoProduto">Preço:</label>
        <input type="number" id="precoProduto" placeholder="Digite o preço" step="0.01" min="0">
    </div>

    <button onclick="adicionarProduto()">Adicionar Produto</button>

    <h2>Produtos Cadastrados:</h2>
    <div id="produtos"></div>

    <h2>Valor Total: <span id="total">R$ 0.00</span></h2>

    <script src="script.js"></script>
</body>
</html>
